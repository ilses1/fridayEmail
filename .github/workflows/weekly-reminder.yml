name: Weekly Friday Reminder

on:
  schedule:
    # 09:40 Beijing Time = 01:40 UTC
    - cron: '40 1 * * 5'
  workflow_dispatch:

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run reminder script
        env:
          MAIL_HOST: ${{ secrets.MAIL_HOST }}
          MAIL_PORT: ${{ secrets.MAIL_PORT }}
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASS: ${{ secrets.MAIL_PASS }}
          MAIL_RECEIVER: ${{ secrets.MAIL_RECEIVER }}
          MAIL_SENDER_NAME: 周报提醒
          MAIL_SUBJECT: 周报提醒：请写一下周报
          MAIL_CONTENT: 今天是周五，记得写一下本周周报，整理本周工作进展、问题和下周计划。
        run: go run ./cmd/send_reminder
